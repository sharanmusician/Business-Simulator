<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Executive Suite | Real-View 360</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <style>
        :root { --gold: #c5a059; --dark: #080808; --glass: rgba(15, 15, 15, 0.95); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; }
        #panorama { width: 100%; height: 100vh; }

        /* CEO Dark UI - Loader */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000; transition: 0.8s;
        }
        .loader-text { color: var(--gold); letter-spacing: 8px; text-transform: uppercase; font-size: 14px; margin-bottom: 20px; font-weight: 300; }
        .line { width: 150px; height: 1px; background: #222; position: relative; }
        .progress { position: absolute; height: 100%; background: var(--gold); width: 0%; transition: 0.3s; }

        /* Floating Info Panel */
        #info-panel {
            position: fixed; bottom: -100%; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: var(--glass);
            border: 1px solid rgba(197, 160, 89, 0.3); border-radius: 12px;
            padding: 24px; color: #fff; z-index: 500; transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6); margin-bottom: 20px;
        }
        #info-panel.active { bottom: 20px; }
        #info-panel h2 { color: var(--gold); margin: 0 0 8px 0; font-size: 18px; font-weight: 400; }
        #info-panel p { font-size: 14px; color: #aaa; line-height: 1.6; margin: 0; }
        .close { position: absolute; top: 15px; right: 15px; cursor: pointer; color: #555; }

        /* Hotspot Styling */
        .hotspot { height: 18px; width: 18px; background: none; border: 1.5px solid var(--gold); border-radius: 50%; cursor: pointer; transition: 0.3s; }
        .hotspot:hover { background: var(--gold); box-shadow: 0 0 15px var(--gold); }

        /* Controls */
        .nav-ui { position: fixed; top: 30px; right: 30px; z-index: 400; display: flex; flex-direction: column; gap: 15px; align-items: center; }
        #compass { width: 40px; height: 40px; opacity: 0.6; transition: 0.1s linear; }
        .zoom-ctrl { width: 40px; height: 40px; background: var(--glass); border: 1px solid #333; color: #fff; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* Hide Branding */
        .pnlm-load-box, .pnlm-logo, .pnlm-compass, .pnlm-zoom-controls { display: none !important; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-text">Initializing Suite</div>
        <div class="line"><div class="progress" id="bar"></div></div>
    </div>

    <div id="panorama"></div>

    <div class="nav-ui">
        <svg id="compass" viewBox="0 0 100 100"><path d="M50 5 L65 45 L50 40 L35 45 Z" fill="#c5a059"/><path d="M50 95 L35 55 L50 60 L65 55 Z" fill="#333"/></svg>
        <div class="zoom-ctrl" onclick="viewer.setHfov(viewer.getHfov() - 7)">+</div>
        <div class="zoom-ctrl" onclick="viewer.setHfov(viewer.getHfov() + 7)">-</div>
    </div>

    <div id="info-panel">
        <span class="close" onclick="closeInfo()">&times;</span>
        <h2 id="title">Location</h2>
        <p id="desc"></p>
    </div>

    <script>
        const viewer = pannellum.viewer('panorama', {
            "type": "equirectangular",
            "panorama": "room.jpg",
            "autoLoad": true,
            "showControls": false,
            
            /* ANTI-STRETCH SETTINGS */
            "hfov": 75,         // The "Sweet Spot": Normal human focal length (no stretch)
            "minHfov": 50,      // Limits zoom-in to keep detail
            "maxHfov": 85,      // Limits zoom-out to prevent "fisheye" warping
            "pitch": 0,         // Starts at horizontal eye level
            "yaw": 0,
            "haov": 360, "vaov": 180, // Full sphere coverage
            
            "hotSpots": [
                { "pitch": -15, "yaw": -5, "cssClass": "hotspot", "clickHandlerFunc": showInfo, "clickHandlerArgs": { "t": "CEO Desk", "d": "Solid obsidian-glass workspace with integrated biometric security." } },
                { "pitch": -10, "yaw": 40, "cssClass": "hotspot", "clickHandlerFunc": showInfo, "clickHandlerArgs": { "t": "Call Assistant", "d": "Dedicated encrypted line to the executive concierge team." } },
                { "pitch": 5, "yaw": 140, "cssClass": "hotspot", "clickHandlerFunc": showInfo, "clickHandlerArgs": { "t": "Skyline View", "d": "Uninterrupted views of the central business district." } }
            ]
        });

        // Rotation & UI Logic
        viewer.on('render', () => {
            document.getElementById('compass').style.transform = `rotate(${-viewer.getYaw()}deg)`;
        });

        function showInfo(e, data) {
            document.getElementById('title').innerText = data.t;
            document.getElementById('desc').innerText = data.d;
            document.getElementById('info-panel').classList.add('active');
        }

        function closeInfo() { document.getElementById('info-panel').classList.remove('active'); }
        viewer.on('mousedown', closeInfo);

        // Professional Loader
        let p = 0;
        let t = setInterval(() => {
            p += Math.random() * 20;
            if (p >= 100) {
                p = 100; clearInterval(t);
                setTimeout(() => { document.getElementById('loader').style.opacity = '0'; 
                setTimeout(() => document.getElementById('loader').style.display='none', 800); }, 500);
            }
            document.getElementById('bar').style.width = p + '%';
        }, 150);
    </script>
</body>
</html>
