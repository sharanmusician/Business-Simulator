<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aethercore | GTA Walk Mode</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <style>
        :root { --gold: #c5a059; --dark: #050505; --glass: rgba(15, 15, 15, 0.85); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #panorama { width: 100%; height: 100vh; cursor: crosshair; }

        /* GTA HUB UI */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000; transition: 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .loader-bar { width: 200px; height: 2px; background: #1a1a1a; margin-top: 20px; overflow: hidden; }
        .progress { height: 100%; background: var(--gold); width: 0%; transition: 0.2s; box-shadow: 0 0 10px var(--gold); }

        /* ANALOG STICK - GTA V STYLE */
        #ui-layer { position: fixed; inset: 0; pointer-events: none; z-index: 500; }
        #joystick-zone {
            position: absolute; bottom: 40px; left: 40px; width: 150px; height: 150px;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            border-radius: 50%; pointer-events: auto; touch-action: none;
            display: flex; align-items: center; justify-content: center;
        }
        #stick-base { width: 80px; height: 80px; border: 1px solid rgba(197, 160, 89, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        #stick-knob {
            width: 45px; height: 45px; background: var(--glass); 
            border: 1px solid var(--gold); border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: transform 0.05s linear;
        }

        /* COMPASS & HUD */
        #hud-top { position: absolute; top: 30px; right: 30px; display: flex; align-items: center; gap: 20px; }
        #compass { width: 50px; height: 50px; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }

        /* INTERACTIVE POPUP */
        #overlay-msg {
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
            background: var(--glass); padding: 15px 40px; border-left: 3px solid var(--gold);
            color: white; opacity: 0; transition: 0.5s; pointer-events: none; text-align: center;
            backdrop-filter: blur(10px);
        }
        #overlay-msg.visible { opacity: 1; top: 10%; }

        /* HOTSPOTS */
        .pnlm-hotspot-base { cursor: pointer !important; }
        .ceo-marker { width: 12px; height: 12px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 0 4px rgba(197,160,89,0.2); }
        
        /* HIDE BRANDING */
        .pnlm-load-box, .pnlm-logo, .pnlm-compass, .pnlm-zoom-controls { display: none !important; }
    </style>
</head>
<body>

    <div id="loader">
        <div style="color:var(--gold); letter-spacing:8px; font-weight:300; font-size:14px;">AETHERCORE INTERACTIVE</div>
        <div class="loader-bar"><div class="progress" id="bar"></div></div>
    </div>

    <div id="panorama"></div>

    <div id="ui-layer">
        <div id="hud-top">
            <svg id="compass" viewBox="0 0 100 100"><path d="M50 5 L65 45 L50 40 L35 45 Z" fill="#c5a059"/><path d="M50 95 L35 55 L50 60 L65 55 Z" fill="#333"/></svg>
        </div>

        <div id="joystick-zone">
            <div id="stick-base"><div id="stick-knob"></div></div>
        </div>

        <div id="overlay-msg">
            <h2 id="msg-title" style="margin:0; font-size:18px; font-weight:400; color:var(--gold);"></h2>
            <p id="msg-body" style="margin:5px 0 0; font-size:14px; color:#ccc;"></p>
        </div>
    </div>

    <script>
        // INIT VIEWER
        const viewer = pannellum.viewer('panorama', {
            "type": "equirectangular",
            "panorama": "room.jpg",
            "autoLoad": true,
            "showControls": false,
            "hfov": 85, "minHfov": 35, "maxHfov": 105,
            "friction": 0.15,
            "hotSpots": [
                { "pitch": -15, "yaw": -5, "cssClass": "ceo-marker", "clickHandlerFunc": triggerMsg, "clickHandlerArgs": { "t": "CEO MAIN DESK", "b": "Advanced workstation with biometric uplink." } },
                { "pitch": -10, "yaw": 45, "cssClass": "ceo-marker", "clickHandlerFunc": triggerMsg, "clickHandlerArgs": { "t": "COMMUNICATIONS", "b": "Direct line to global operations assistant." } },
                { "pitch": 5, "yaw": 135, "cssClass": "ceo-marker", "clickHandlerFunc": triggerMsg, "clickHandlerArgs": { "t": "NORTH VIEW", "b": "Financial district skyline access." } }
            ]
        });

        // JOYSTICK ENGINE
        const zone = document.getElementById('joystick-zone');
        const knob = document.getElementById('stick-knob');
        let moveX = 0, moveY = 0;
        let active = false;

        const updateStick = (e) => {
            if (!active) return;
            const pos = e.touches ? e.touches[0] : e;
            const rect = zone.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let x = pos.clientX - centerX;
            let y = pos.clientY - centerY;
            const dist = Math.min(Math.sqrt(x*x + y*y), 60);
            const angle = Math.atan2(y, x);
            
            moveX = (Math.cos(angle) * dist) / 60;
            moveY = (Math.sin(angle) * dist) / 60;
            
            knob.style.transform = `translate(${moveX * 35}px, ${moveY * 35}px)`;
        };

        zone.addEventListener('touchstart', (e) => { active = true; e.preventDefault(); });
        zone.addEventListener('mousedown', () => active = true);
        window.addEventListener('touchmove', updateStick);
        window.addEventListener('mousemove', updateStick);
        window.addEventListener('touchend', () => { active = false; moveX = 0; moveY = 0; knob.style.transform = 'translate(0,0)'; });
        window.addEventListener('mouseup', () => { active = false; moveX = 0; moveY = 0; knob.style.transform = 'translate(0,0)'; });

        // GAME LOOP (WALK SIMULATION)
        function gameLoop() {
            if (active) {
                // PANNING (Look Left/Right)
                const currentYaw = viewer.getYaw();
                viewer.setYaw(currentYaw + (moveX * 2.5));

                // WALKING (Simulated by Focal Depth)
                const currentZoom = viewer.getHfov();
                // moveY < 0 is forward, moveY > 0 is backward
                viewer.setHfov(currentZoom + (moveY * 1.8));
            }

            // Sync Compass
            document.getElementById('compass').style.transform = `rotate(${-viewer.getYaw()}deg)`;
            requestAnimationFrame(gameLoop);
        }
        gameLoop();

        // UI HELPERS
        function triggerMsg(e, data) {
            const box = document.getElementById('overlay-msg');
            document.getElementById('msg-title').innerText = data.t;
            document.getElementById('msg-body').innerText = data.b;
            box.classList.add('visible');
            setTimeout(() => box.classList.remove('visible'), 4000);
        }

        // LOADER
        let p = 0;
        const intrvl = setInterval(() => {
            p += Math.random() * 15;
            if (p >= 100) {
                p = 100; clearInterval(intrvl);
                setTimeout(() => {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader').style.display='none', 1000);
                }, 500);
            }
            document.getElementById('bar').style.width = p + '%';
        }, 120);
    </script>
</body>
</html>
