<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Executive Suite | 360 View</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <style>
        :root {
            --gold: #c5a059;
            --dark-bg: #0a0a0a;
            --glass: rgba(20, 20, 20, 0.85);
            --text: #e0e0e0;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--dark-bg);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        #panorama {
            width: 100%;
            height: 100vh;
        }

        /* Loading Screen */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1s ease;
        }

        .loader-logo {
            color: var(--gold);
            font-size: 24px;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 20px;
            font-weight: 300;
        }

        .loader-bar {
            width: 200px;
            height: 1px;
            background: #333;
            position: relative;
        }

        .loader-progress {
            position: absolute;
            height: 100%;
            background: var(--gold);
            width: 0%;
            transition: width 0.5s ease;
        }

        /* Custom Hotspot Styling */
        .custom-hotspot {
            height: 24px;
            width: 24px;
            background: rgba(197, 160, 89, 0.3);
            border: 1px solid var(--gold);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(197, 160, 89, 0.5);
        }
        
        .custom-hotspot:hover {
            background: var(--gold);
            transform: scale(1.2);
        }

        /* Premium Popup */
        #info-panel {
            position: fixed;
            bottom: -300px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 15px 15px 0 0;
            padding: 25px;
            color: var(--text);
            z-index: 500;
            transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        #info-panel.active {
            bottom: 0;
        }

        #info-panel h2 {
            margin: 0 0 10px 0;
            color: var(--gold);
            font-weight: 400;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .close-panel {
            position: absolute;
            top: 15px;
            right: 15px;
            cursor: pointer;
            color: #666;
            font-size: 20px;
        }

        /* Controls */
        .custom-controls {
            position: fixed;
            bottom: 30px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 400;
        }

        .ctrl-btn {
            width: 45px;
            height: 45px;
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 20px;
            backdrop-filter: blur(5px);
        }

        .ctrl-btn:active {
            background: var(--gold);
        }

        /* Compass Indicator */
        #compass {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50 5 L60 45 L50 40 L40 45 Z" fill="%23c5a059"/><path d="M50 95 L40 55 L50 60 L60 55 Z" fill="%23333"/></svg>');
            background-size: contain;
            z-index: 400;
            transition: transform 0.1s linear;
        }

        /* Hide Pannellum Branding */
        .pnlm-load-box, .pnlm-logo, .pnlm-compass, .pnlm-zoom-controls {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-logo">Executive Suite</div>
        <div class="loader-bar"><div class="loader-progress" id="progress"></div></div>
    </div>

    <div id="panorama"></div>

    <div id="compass"></div>

    <div class="custom-controls">
        <div class="ctrl-btn" onclick="viewer.setHfov(viewer.getHfov() - 10)">+</div>
        <div class="ctrl-btn" onclick="viewer.setHfov(viewer.getHfov() + 10)">-</div>
    </div>

    <div id="info-panel">
        <span class="close-panel" onclick="closePanel()">&times;</span>
        <h2 id="panel-title">Location</h2>
        <p id="panel-desc">Details about this area of the executive suite.</p>
    </div>

    <script>
        // Initialize Pannellum Viewer
        const viewer = pannellum.viewer('panorama', {
            "type": "equirectangular",
            "panorama": "room.jpg",
            "autoLoad": true,
            "showControls": false,
            "friction": 0.15,
            "hotSpots": [
                {
                    "pitch": -15,
                    "yaw": 0,
                    "cssClass": "custom-hotspot",
                    "createTooltipFunc": hotspotTooltip,
                    "createTooltipArgs": "CEO Desk",
                    "clickHandlerFunc": openPanel,
                    "clickHandlerArgs": {
                        "title": "CEO Desk",
                        "desc": "Custom-crafted mahogany workspace with integrated smart controls and encrypted communications."
                    }
                },
                {
                    "pitch": -10,
                    "yaw": 45,
                    "cssClass": "custom-hotspot",
                    "createTooltipFunc": hotspotTooltip,
                    "createTooltipArgs": "Call Assistant",
                    "clickHandlerFunc": openPanel,
                    "clickHandlerArgs": {
                        "title": "Communication Hub",
                        "desc": "Direct line to executive support and global offices. Active 24/7."
                    }
                },
                {
                    "pitch": 5,
                    "yaw": 120,
                    "cssClass": "custom-hotspot",
                    "createTooltipFunc": hotspotTooltip,
                    "createTooltipArgs": "Skyline View",
                    "clickHandlerFunc": openPanel,
                    "clickHandlerArgs": {
                        "title": "North Wing View",
                        "desc": "Panoramic views of the financial district from the 82nd floor."
                    }
                }
            ]
        });

        // Update compass and loading progress
        viewer.on('mousedown', closePanel);
        
        viewer.on('render', function() {
            // Rotate compass based on viewer yaw
            const yaw = viewer.getYaw();
            document.getElementById('compass').style.transform = `rotate(${-yaw}deg)`;
        });

        // Fake progress for smooth luxury feel
        let prog = 0;
        const interval = setInterval(() => {
            prog += 5;
            document.getElementById('progress').style.width = prog + '%';
            if (prog >= 100) {
                clearInterval(interval);
                setTimeout(() => {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loader').style.display = 'none';
                    }, 1000);
                }, 500);
            }
        }, 100);

        // Hotspot Tooltip Creator
        function hotspotTooltip(hotSpotDiv, args) {
            hotSpotDiv.classList.add('custom-hotspot');
            const span = document.createElement('span');
            span.innerHTML = args;
            span.style.position = 'absolute';
            span.style.width = '100px';
            span.style.textAlign = 'center';
            span.style.marginLeft = '-40px';
            span.style.marginTop = '-30px';
            span.style.color = '#c5a059';
            span.style.fontSize = '12px';
            span.style.textTransform = 'uppercase';
            span.style.pointerEvents = 'none';
            hotSpotDiv.appendChild(span);
        }

        // UI Functions
        function openPanel(event, data) {
            document.getElementById('panel-title').innerText = data.title;
            document.getElementById('panel-desc').innerText = data.desc;
            document.getElementById('info-panel').classList.add('active');
        }

        function closePanel() {
            document.getElementById('info-panel').classList.remove('active');
        }
    </script>
</body>
</html>
